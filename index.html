<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登山留守監控儀表板 - 滿版圖表版</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@raruto/leaflet-elevation/dist/leaflet-elevation.min.css" />

    <style>
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #000; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 比例分配：地圖 8 份，圖表 2 份 */
        #map { flex: 8; width: 100%; position: relative; }

        #elevation-chart { 
            flex: 2; 
            background: #f8f9fa; 
            height: 20vh; 
            min-height: 120px; 
            border-top: 2px solid #ddd; 
            position: relative;
            overflow: hidden; /* 防止內容溢出 */
        }

        /* 移除底部的 Legend 空間與強制 SVG 貼底 */
        .elevation-control .legend { display: none !important; }
        .elevation-control.elevation-detached svg {
            display: block;
            margin-bottom: -5px; /* 強迫繪圖區更貼近底部 */
        }

        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.92);
            padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 200px; backdrop-filter: blur(5px);
        }

        h4 { margin: 0 0 8px 0; color: #333; font-size: 14px; display: flex; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .info-row { font-size: 13px; color: #444; margin-bottom: 4px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .data-val { font-weight: bold; color: #000; float: right; }
        .msg-box { color: #d32f2f; font-weight: bold; display: block; margin-top: 2px; font-size: 12px; }

        .action-bar { display: flex; gap: 5px; margin-top: 8px; }
        .btn-sm { flex: 1; padding: 8px 0; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; }
        .btn-primary { background: #0078ff; color: white; }
        .btn-outline { background: #fff; color: #555; border: 1px solid #ccc; }

        .settings-content { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #bbb; }
        .settings-content.active { display: block; }

        .number-icon { background: #ff4400; border: 2px solid white; border-radius: 50%; color: white; text-align: center; line-height: 20px; font-size: 11px; font-weight: bold; }
        .custom-pin { width: 24px; height: 24px; border-radius: 50% 50% 50% 0; background: #e61e1e; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -24px 0 0 -12px; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="info-panel">
    <h4><span class="status-dot"></span>留守監控 (<span id="gpx-name-display">載入中</span>)</h4>
    <div class="info-row">時間：<span class="data-val" id="last-time">-</span></div>
    <div class="info-row">座標：<span class="data-val" id="last-coord">-</span></div>
    <div style="font-size:12px; color:#666;">最新訊息：</div>
    <div class="msg-box" id="last-msg">等待回報...</div>
    
    <div class="action-bar">
        <button class="btn-sm btn-primary" onclick="zoomToCurrent()">定位</button>
        <button class="btn-sm btn-outline" id="toggle-btn" onclick="toggleSettings()">設定 ▾</button>
    </div>

    <div id="settings-menu" class="settings-content">
        <select onchange="changeBaseLayer(this.value)" style="width:100%; padding:4px; font-size:12px;">
            <option value="rudy">魯地圖 (登山推薦)</option>
            <option value="nlsc">國土測繪通用圖</option>
            <option value="osm">OSM 街道圖</option>
        </select>
        <button class="btn-sm btn-outline" style="width:100%; margin-top:5px;" onclick="location.reload()">重新整理</button>
    </div>
</div>

<div id="map"></div>
<div id="elevation-chart"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
<script src="https://d3js.org/d3.v6.min.js"></script>
<script src="https://unpkg.com/@raruto/leaflet-elevation/dist/leaflet-elevation.min.js"></script>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxhEOvYjimYgpZYpa1tts8et_IuQlc2Agx4Rco1KQqtt4Z7rsENNOTYkMrLPKHMh0nv4A/exec';
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1MrdXtkY7rISADs_7Wgsde5LNWN9OWVIzNKSi92auyKU/export?format=csv"; 

const layers = {
    rudy: L.tileLayer('https://tile.happyman.idv.tw/map/rudy/{z}/{x}/{y}.png', { attribution: '魯地圖', maxZoom: 18 }),
    nlsc: L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', { maxZoom: 18 }),
    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 })
};

const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([23.5, 121], 7);
layers.rudy.addTo(map);

// 優化核心：forceAxisBounds + 極小化 bottom margin
const elevationControl = L.control.elevation({
    theme: "steelblue-theme", 
    detached: true,
    elevationDiv: "#elevation-chart",
    height: 150, // 增加高度值，讓繪圖主體填滿容器
    autohide: false,
    collapsed: false,
    position: "bottomleft",
    summary: false, 
    legend: false,
    followMarker: true,
    marker: "circle",
    snapToData: true,
    forceAxisBounds: true, // 座標軸緊貼海拔極值，消除上下空白
    margins: { top: 5, right: 25, bottom: 10, left: 45 } // 底部壓低至 10，僅供顯示公里數字
}).addTo(map);

const gpxLayer = L.layerGroup().addTo(map);
const historyMarkers = L.layerGroup().addTo(map);
const historyLine = L.polyline([], { color: '#ff4400', weight: 3, dashArray: '5, 8', opacity: 0.6 }).addTo(map);

let currentGpxName = ""; 
let lastPos = [0, 0];

async function syncGpx() {
    try {
        const res = await fetch(GAS_URL + "?cb=" + Date.now());
        const data = await res.json();
        if (data.selectedGPX && data.selectedGPX !== currentGpxName) {
            loadGPX(data.selectedGPX);
        }
    } catch (e) { console.error("GPX 同步失敗"); }
}

function loadGPX(file) {
    gpxLayer.clearLayers();
    if (elevationControl) elevationControl.clear();

    const gpx = new L.GPX(file, {
        async: true,
        marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
        polyline_options: { color: '#FF1493', weight: 5, opacity: 0.8 }
    });

    gpx.on('loaded', e => {
        map.fitBounds(e.target.getBounds());
        currentGpxName = file;
        document.getElementById('gpx-name-display').innerText = file.replace('.gpx', '').substring(0,6);
        
        const track = e.target.getLayers()[0]; 
        if (track) {
            elevationControl.addData(track);
        } else {
            elevationControl.addData(e.target);
        }
        
        setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 500);
    });

    gpx.addTo(gpxLayer);
}

async function fetchLatest() {
    try {
        const res = await fetch(SHEET_CSV_URL + "&cb=" + Date.now());
        const csv = await res.text();
        const rows = csv.trim().split('\n').slice(1);
        if (rows.length === 0) return;

        historyMarkers.clearLayers();
        const latlngs = [];

        rows.forEach((row, idx) => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const rawTime = cols[0], 
                  lat = parseFloat(cols[1]), 
                  lng = parseFloat(cols[2]), 
                  msg = (cols[3] || "無").replace(/"/g, "");

            if (!isNaN(lat) && !isNaN(lng)) {
                const pos = [lat, lng];
                latlngs.push(pos);
                const isLatest = (idx === rows.length - 1);

                L.marker(pos, {
                    icon: L.divIcon({
                        className: isLatest ? '' : 'number-icon',
                        html: isLatest ? '<div class="custom-pin"></div>' : (idx + 1),
                        iconSize: [24, 24], iconAnchor: [12, 24]
                    })
                }).addTo(historyMarkers).bindPopup(`時間: ${rawTime}<br>訊息: ${msg}`);

                if (isLatest) {
                    lastPos = pos;
                    updateUI(rawTime, lat, lng, msg);
                    setTimeout(() => {
                        if (elevationControl && elevationControl._data && elevationControl._data.length > 0) {
                            elevationControl.locate(L.latLng(lat, lng));
                        }
                    }, 1000);
                }
            }
        });
        historyLine.setLatLngs(latlngs);
    } catch (e) { console.error("座標讀取失敗"); }
}

function updateUI(rawTime, lat, lng, msg) {
    try {
        const dateObj = new Date(rawTime);
        document.getElementById('last-time').innerText = `${dateObj.getMonth() + 1}/${dateObj.getDate()} ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
    } catch(e) { document.getElementById('last-time').innerText = rawTime; }
    document.getElementById('last-coord').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    document.getElementById('last-msg').innerText = msg;
}

function zoomToCurrent() { if (lastPos[0] !== 0) map.setView(lastPos, 16); }
function toggleSettings() { document.getElementById('settings-menu').classList.toggle('active'); }
function changeBaseLayer(key) {
    Object.values(layers).forEach(l => map.removeLayer(l));
    layers[key].addTo(map);
}

setInterval(() => { syncGpx(); fetchLatest(); }, 60000);
syncGpx();
fetchLatest();
</script>
</body>
</html>
