<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登山留守監控儀表板 - 內嵌數據版</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #000; }
        #map { height: 100vh; width: 100%; }

        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.92);
            padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 190px; backdrop-filter: blur(8px);
        }

        h4 { margin: 0 0 8px 0; color: #333; font-size: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .info-row { font-size: 13px; color: #444; margin-bottom: 4px; line-height: 1.4; }
        .data-val { font-weight: bold; color: #000; }
        .time-warning { color: #e61e1e; font-weight: bold; }

        .action-bar { display: flex; gap: 6px; margin-top: 10px; }
        .btn-sm { flex: 1; padding: 8px 2px; font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; text-align: center; }
        .btn-primary { background: #0078ff; color: white; }
        .btn-outline { background: #fff; color: #555; border: 1px solid #ccc; }

        .settings-content { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #bbb; }
        .settings-content.active { display: block; }

        select { width: 100%; padding: 6px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }
        .layer-toggle { font-size: 12px; display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .layer-toggle input { margin-right: 8px; }

        .number-icon { background-color: #ff4400; border: 2px solid white; border-radius: 50%; color: white; font-weight: bold; text-align: center; line-height: 20px; font-size: 10px; }
        .custom-pin { width: 24px; height: 24px; border-radius: 50% 50% 50% 0; background: #e61e1e; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -24px 0 0 -12px; border: 2px solid #fff; }
        .wpt-dot-icon { background-color: #ffffff; border: 2px solid #FF1493; border-radius: 50%; }

        @media (max-width: 480px) { .info-panel { width: 165px; padding: 10px; } }
    </style>
</head>
<body>

<div class="info-panel">
    <h4><span class="status-dot"></span>留守監控</h4>
    <div class="info-row">最後：<span class="data-val" id="last-time">讀取中...</span></div>
    <div class="info-row">座標：<span class="data-val" id="last-coord">-</span></div>
    <div class="info-row">訊息：<span class="data-val" id="last-msg">無</span></div>

    <div class="action-bar">
        <button class="btn-sm btn-primary" onclick="zoomToCurrent()">定位</button>
        <button class="btn-sm btn-outline" id="toggle-btn" onclick="toggleSettings()">選單 ▾</button>
    </div>

    <div id="settings-menu" class="settings-content">
        <select id="base-layer-select" onchange="changeBaseLayer(this.value)">
            <option value="rudy">🗺️ 魯地圖</option>
            <option value="nlsc">🗺️ 國土測繪圖</option>
            <option value="topo">🗺️ 地形圖</option>
            <option value="osm">🗺️ 街道圖</option>
        </select>
        <label class="layer-toggle"><input type="checkbox" checked onchange="toggleLayer('gpx', this.checked)"> 預計路線</label>
        <label class="layer-toggle"><input type="checkbox" checked onchange="toggleLayer('history', this.checked)"> 回報點位</label>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
// --- GPX 數據內嵌區 ---
// 請將下方引號內的內容替換成你實際的 GPX 文本
const gpxStaticData = `
<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Manual">
  <trk><name>預計路線</name><trkseg>
    <trkpt lat="25.0336" lon="121.5648"></trkpt>
  </trkseg></trk>
</gpx>
`;

// --- 配置區 ---
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1MrdXtkY7rISADs_7Wgsde5LNWN9OWVIzNKSi92auyKU/export?format=csv";

// --- 地圖邏輯 ---
const layers = {
    rudy: L.tileLayer('https://tile.happyman.idv.tw/map/rudy/{z}/{x}/{y}.png', { attribution: '© 魯地圖' }),
    nlsc: L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', { maxZoom: 18, attribution: '© 內政部' }),
    topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17, attribution: '© OpenTopoMap' }),
    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' })
};

const map = L.map('map', { zoomControl: false, tap: false }).setView([23.5, 121], 7);
layers.rudy.addTo(map);

const gpxLayer = L.layerGroup().addTo(map);
const historyGroup = L.layerGroup().addTo(map);
const historyMarkers = L.layerGroup().addTo(historyGroup);
const historyLine = L.polyline([], { color: '#ff4400', weight: 3, dashArray: '5, 8', opacity: 0.7 }).addTo(historyGroup);

function toggleSettings() {
    const menu = document.getElementById('settings-menu');
    const btn = document.getElementById('toggle-btn');
    const isActive = menu.classList.toggle('active');
    btn.innerText = isActive ? "收起 ▴" : "選單 ▾";
}

function changeBaseLayer(key) {
    Object.values(layers).forEach(l => map.removeLayer(l));
    layers[key].addTo(map);
}

function toggleLayer(type, isShow) {
    if (type === 'gpx') isShow ? map.addLayer(gpxLayer) : map.removeLayer(gpxLayer);
    if (type === 'history') isShow ? map.addLayer(historyGroup) : map.removeLayer(historyGroup);
}

// 直接讀取內嵌文字，徹底解決手機讀檔權限問題
function initTrack() {
    new L.GPX(gpxStaticData, {
        async: true,
        marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, wptIconUrls: { '': null } },
        polyline_options: { color: '#FF1493', weight: 5, opacity: 0.7, lineJoin: 'round' }
    })
    .on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
        setTimeout(() => map.invalidateSize(), 500);
    })
    .addTo(gpxLayer);
}

let lastPos = [0, 0];
async function fetchLatestLocation() {
    try {
        const response = await fetch(SHEET_CSV_URL + "&cb=" + Date.now());
        const csvData = await response.text();
        const rows = csvData.trim().split('\n').filter(r => r.trim() !== "");
        if (rows.length <= 1) return; 

        historyMarkers.clearLayers();
        const latlngs = []; 
        const dataRows = rows.slice(1); 

        dataRows.forEach((row, index) => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const time = cols[0], lat = parseFloat(cols[1]), lng = parseFloat(cols[2]), msg = (cols[3] || "無").replace(/"/g, "");

            if (!isNaN(lat) && !isNaN(lng)) {
                const pos = [lat, lng];
                latlngs.push(pos);
                const isLatest = (index === dataRows.length - 1);
                
                L.marker(pos, {
                    icon: L.divIcon({
                        className: isLatest ? 'latest-pin-container' : 'number-icon',
                        html: isLatest ? '<div class="custom-pin"></div>' : (index + 1).toString().padStart(2, '0'),
                        iconSize: isLatest ? [24, 24] : [20, 20],
                        iconAnchor: isLatest ? [12, 24] : [10, 10]
                    })
                }).addTo(historyMarkers).bindPopup(`<b>${isLatest?'最新回報':'序號:'+(index+1)}</b><br>時間: ${time}`);
                
                if (isLatest) {
                    lastPos = pos;
                    updateInfoPanel(time, pos, msg);
                }
            }
        });
        historyLine.setLatLngs(latlngs);
    } catch (e) { console.error('Data error:', e); }
}

function updateInfoPanel(time, pos, msg) {
    const reportTime = new Date(time.replace(/-/g, '/')); 
    const diffMins = Math.floor((new Date() - reportTime) / 60000);
    const timeDisplay = isNaN(diffMins) ? "--" : `${diffMins}m前`;
    const timeClass = diffMins > 60 ? 'time-warning' : '';
    document.getElementById('last-time').innerHTML = `<span class="${timeClass}">${timeDisplay}</span> <small>(${time.split(' ')[1]?.substring(0,5) || ''})</small>`;
    document.getElementById('last-coord').innerText = `${pos[0].toFixed(4)}, ${pos[1].toFixed(4)}`;
    document.getElementById('last-msg').innerText = msg;
}

function zoomToCurrent() { if (lastPos[0] !== 0) { map.setView(lastPos, 16); setTimeout(() => map.invalidateSize(), 100); } }

initTrack();
fetchLatestLocation();
setInterval(fetchLatestLocation, 300000);
window.addEventListener('resize', () => map.invalidateSize());
</script>
</body>
</html>
