<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登山留守監控儀表板 - 完整功能版</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #000; }
        #map { height: 100vh; width: 100%; }

        /* 右上角整合面板 */
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 180px; backdrop-filter: blur(6px);
        }

        h4 { margin: 0 0 8px 0; color: #333; font-size: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #4CAF50; margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .info-row { font-size: 13px; color: #444; margin-bottom: 3px; line-height: 1.4; }
        .data-val { font-weight: bold; color: #000; }
        .time-warning { color: #e61e1e; font-weight: bold; }

        .action-bar { display: flex; gap: 6px; margin-top: 10px; }
        .btn-sm {
            flex: 1; padding: 8px 4px; font-size: 12px; border-radius: 6px;
            cursor: pointer; font-weight: bold; border: none;
            transition: background 0.2s;
        }
        .btn-primary { background: #0078ff; color: white; }
        .btn-outline { background: #fff; color: #555; border: 1px solid #ccc; }

        /* 隱藏式選單內容 (圖資切換) */
        .settings-content {
            display: none; margin-top: 10px; padding-top: 10px;
            border-top: 1px dashed #bbb;
        }
        .settings-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        select { width: 100%; padding: 6px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }

        /* 地圖元件樣式 */
        .number-icon {
            background-color: #ff4400; border: 2px solid white; border-radius: 50%;
            color: white; font-weight: bold; text-align: center; line-height: 20px;
            font-size: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .custom-pin {
            width: 24px; height: 24px; border-radius: 50% 50% 50% 0;
            background: #e61e1e; position: absolute; transform: rotate(-45deg);
            left: 50%; top: 50%; margin: -24px 0 0 -12px;
            border: 2px solid #fff; box-shadow: 0 0 8px rgba(0,0,0,0.4);
        }
        
        @media (max-width: 480px) { .info-panel { width: 160px; padding: 10px; } }
    </style>
</head>
<body>

<div class="info-panel">
    <h4><span class="status-dot"></span>留守監控</h4>
    <div class="info-row">最後：<span class="data-val" id="last-time">載入中...</span></div>
    <div class="info-row">座標：<span class="data-val" id="last-coord">-</span></div>
    <div class="info-row">路線：<span class="data-val" id="gpx-name">同步中...</span></div>

    <div class="action-bar">
        <button class="btn-sm btn-primary" onclick="zoomToCurrent()">定位</button>
        <button class="btn-sm btn-outline" id="toggle-btn" onclick="toggleSettings()">選單 ▾</button>
    </div>

    <div id="settings-menu" class="settings-content">
        <label style="font-size: 11px; color: #666;">切換底圖：</label>
        <select id="base-layer-select" onchange="changeBaseLayer(this.value)">
            <option value="rudy">🗺️ 魯地圖</option>
            <option value="nlsc">🗺️ 國土測繪圖</option>
            <option value="topo">🗺️ 地形圖</option>
            <option value="osm">🗺️ 街道圖</option>
        </select>
        <button class="btn-sm btn-outline" style="width:100%" onclick="location.reload()">重新整理頁面</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>
// --- 設定區 ---
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxhEOvYjimYgpZYpa1tts8et_IuQlc2Agx4Rco1KQqtt4Z7rsENNOTYkMrLPKHMh0nv4A/exec';
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1MrdXtkY7rISADs_7Wgsde5LNWN9OWVIzNKSi92auyKU/export?format=csv"; 

// 1. 地圖圖層定義
const layers = {
    rudy: L.tileLayer('https://tile.happyman.idv.tw/map/rudy/{z}/{x}/{y}.png', { attribution: '© 魯地圖' }),
    nlsc: L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', { maxZoom: 18, attribution: '© 內政部' }),
    topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17, attribution: '© OpenTopoMap' }),
    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' })
};

const map = L.map('map', { zoomControl: false }).setView([23.5, 121], 7);
layers.rudy.addTo(map); // 預設使用魯地圖

const gpxLayer = L.layerGroup().addTo(map);
const historyMarkers = L.layerGroup().addTo(map);
const historyLine = L.polyline([], { color: '#ff4400', weight: 3, dashArray: '5, 8', opacity: 0.6 }).addTo(map);

let currentGpxName = ""; 
let lastPos = [0, 0];

// 2. 功能邏輯
function toggleSettings() {
    const menu = document.getElementById('settings-menu');
    const btn = document.getElementById('toggle-btn');
    const isActive = menu.classList.toggle('active');
    btn.innerText = isActive ? "收起 ▴" : "選單 ▾";
}

function changeBaseLayer(key) {
    Object.values(layers).forEach(l => map.removeLayer(l));
    layers[key].addTo(map);
}

// 3. 雲端同步 GPX 路線
async function syncGpxFromCloud() {
    try {
        const response = await fetch(GAS_URL + "?cb=" + Date.now());
        const data = await response.json();
        const cloudGpx = data.selectedGPX;

        if (cloudGpx && cloudGpx !== currentGpxName) {
            loadTrack(cloudGpx);
        }
    } catch (e) { console.error("同步失敗", e); }
}

function loadTrack(fileName) {
    gpxLayer.clearLayers();
    new L.GPX(fileName, {
        async: true,
        marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, wptIconUrls: { '': null } },
        polyline_options: { color: '#FF1493', weight: 5, opacity: 0.7 }
    })
    .on('loaded', function(e) {
        map.fitBounds(e.target.getBounds());
        currentGpxName = fileName;
        document.getElementById('gpx-name').innerText = fileName.replace('.gpx', '');
    })
    .addTo(gpxLayer);
}

// 4. 座標處理
async function fetchLatestLocation() {
    try {
        const response = await fetch(SHEET_CSV_URL + "&cb=" + Date.now());
        const csvData = await response.text();
        const rows = csvData.trim().split('\n').filter(r => r.trim() !== "").slice(1);
        
        historyMarkers.clearLayers();
        const latlngs = []; 

        rows.forEach((row, index) => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const time = cols[0], lat = parseFloat(cols[1]), lng = parseFloat(cols[2]);
            if (!isNaN(lat) && !isNaN(lng)) {
                const pos = [lat, lng];
                latlngs.push(pos);
                const isLatest = (index === rows.length - 1);
                L.marker(pos, {
                    icon: L.divIcon({
                        className: isLatest ? '' : 'number-icon',
                        html: isLatest ? '<div class="custom-pin"></div>' : (index + 1),
                        iconSize: [24, 24], iconAnchor: [12, 24]
                    })
                }).addTo(historyMarkers);
                if (isLatest) {
                    lastPos = pos;
                    document.getElementById('last-time').innerText = time.split(' ')[1].substring(0,5);
                    document.getElementById('last-coord').innerText = `${lat.toFixed(4)},${lng.toFixed(4)}`;
                }
            }
        });
        historyLine.setLatLngs(latlngs);
    } catch (e) { console.error(e); }
}

function zoomToCurrent() { if (lastPos[0] !== 0) map.setView(lastPos, 16); }

setInterval(() => { syncGpxFromCloud(); fetchLatestLocation(); }, 60000);
syncGpxFromCloud();
fetchLatestLocation();
</script>
</body>
</html>
