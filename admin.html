<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登山留守 - 雲端管理後台</title>
    <style>
        :root { --primary: #0078ff; --danger: #e61e1e; --bg: #f4f7f6; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; padding: 20px; background: var(--bg); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { text-align: center; color: #333; font-size: 24px; margin-bottom: 25px; }
        h2 { color: #333; margin-top: 0; border-left: 5px solid var(--primary); padding-left: 10px; font-size: 18px; }
        
        /* 表單元件 */
        label { display: block; margin-top: 15px; font-size: 14px; color: #666; }
        select, input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* 按鈕樣式 */
        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); margin-top: 20px; }
        .btn:active { opacity: 0.8; }
        
        /* 開關樣式 */
        .switch-group { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .status-msg { margin-top: 15px; font-size: 13px; font-weight: bold; text-align: center; min-height: 20px; }
        
        hr { border: 0; border-top: 1px dashed #ddd; margin: 20px 0; }
        #current-gpx { color: var(--primary); word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>⛰️ 登山留守管理</h1>

    <div class="card">
        <h2>1. 航跡 (GPX) 同步設定</h2>
        <p>目前雲端指定：<strong id="current-gpx">載入中...</strong></p>
        
        <label>切換現有軌跡：</label>
        <select id="gpx-list" onchange="changeGpx(this.value)">
            <option value="">正在讀取雲端清單...</option>
        </select>

        <hr>
        <label>上傳並同步新檔案：</label>
        <input type="file" id="gpx-file" accept=".gpx">
        <button class="btn btn-primary" onclick="uploadGpx()">確認上傳並切換路線</button>
        <div id="gpx-status" class="status-msg"></div>
    </div>

    <div class="card">
        <h2>2. 自動通知開關</h2>
        <div class="switch-group">
            <span>LINE 通知發送</span>
            <input type="checkbox" id="enable-line" style="width:22px; height:22px;" onchange="updateNotifySettings()">
        </div>
        <div class="switch-group">
            <span>Telegram 通知發送</span>
            <input type="checkbox" id="enable-tg" style="width:22px; height:22px;" onchange="updateNotifySettings()">
        </div>
        <div id="notify-status" class="status-msg"></div>
    </div>

    <div class="card" style="text-align: center;">
        <h2>3. 數據維護</h2>
        <button class="btn btn-danger" onclick="clearSheet()">⚠️ 清空試算表回報紀錄</button>
        <div id="sheet-status" class="status-msg"></div>
    </div>
</div>

<script>
    // ⚠️ 請務必填入你「更新部署」後的 GAS 網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxhEOvYjimYgpZYpa1tts8et_IuQlc2Agx4Rco1KQqtt4Z7rsENNOTYkMrLPKHMh0nv4A/exec';

    // 1. 初始化：從雲端抓取目前狀態
    window.onload = async function() {
        showStatus('gpx-status', '正在同步雲端設定...', 'orange');
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();

            // 更新通知開關
            document.getElementById('enable-line').checked = data.line;
            document.getElementById('enable-tg').checked = data.telegram;

            // 更新 GPX 下拉清單
            const select = document.getElementById('gpx-list');
            select.innerHTML = '';
            if (data.gpxFiles && data.gpxFiles.length > 0) {
                data.gpxFiles.forEach(file => {
                    const opt = new Option(file, file);
                    select.add(opt);
                });
                // 設定目前選中的值
                if (data.selectedGPX) {
                    select.value = data.selectedGPX;
                    document.getElementById('current-gpx').innerText = data.selectedGPX;
                }
            } else {
                select.add(new Option("無可用軌跡，請先上傳", ""));
            }

            showStatus('gpx-status', '✅ 雲端同步完成', 'green');
        } catch (e) {
            showStatus('gpx-status', '❌ 無法連線至雲端 (GAS)', 'red');
            console.error(e);
        }
    };

    // 2. 切換 GPX 軌跡
    async function changeGpx(val) {
        if (!val) return;
        showStatus('gpx-status', '正在切換路線...', 'orange');
        document.getElementById('current-gpx').innerText = val;
        
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'saveGpxName', fileName: val })
            });
            showStatus('gpx-status', '✅ 成功切換至：' + val, 'green');
        } catch (e) {
            showStatus('gpx-status', '❌ 切換失敗', 'red');
        }
    }

    // 3. 上傳新 GPX 檔案名至雲端
    async function uploadGpx() {
        const fileInput = document.getElementById('gpx-file');
        const file = fileInput.files[0];
        if (!file) return alert('請先選擇 .gpx 檔案');

        const fileName = file.name;
        showStatus('gpx-status', '正在同步新檔名至雲端...', 'orange');

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'saveGpxName', fileName: fileName })
            });

            // 成功後更新 UI
            const select = document.getElementById('gpx-list');
            if (![...select.options].some(opt => opt.value === fileName)) {
                select.add(new Option(fileName, fileName), 0);
            }
            select.value = fileName;
            document.getElementById('current-gpx').innerText = fileName;
            
            showStatus('gpx-status', '✅ 「' + fileName + '」已設為目前路線', 'green');
            fileInput.value = ''; // 清空選取器
        } catch (e) {
            showStatus('gpx-status', '❌ 同步失敗', 'red');
        }
    }

    // 4. 更新通知設定
    async function updateNotifySettings() {
        const line = document.getElementById('enable-line').checked;
        const tg = document.getElementById('enable-tg').checked;
        showStatus('notify-status', '同步設定中...', 'orange');

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'updateConfig', line: line, telegram: tg })
            });
            showStatus('notify-status', '✅ 通知設定已更新', 'green');
        } catch (e) {
            showStatus('notify-status', '❌ 更新失敗', 'red');
        }
    }

    // 5. 清空資料
    async function clearSheet() {
        if (!confirm('⚠️ 警告：這將刪除試算表中除了標題以外的所有座標紀錄，確定嗎？')) return;
        showStatus('sheet-status', '正在處理...', 'orange');

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'clearData' })
            });
            showStatus('sheet-status', '✅ 回報紀錄已清空', 'green');
        } catch (e) {
            showStatus('sheet-status', '❌ 清空失敗', 'red');
        }
    }

    // 工具：顯示狀態訊息
    function showStatus(id, msg, color) {
        const el = document.getElementById(id);
        el.innerText = msg;
        el.style.color = color;
    }
</script>

</body>
</html>
